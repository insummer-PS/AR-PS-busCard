<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      
      /* Scanning Overlay */
      #scanning-overlay { display: flex; align-items: center; justify-content: center; position: absolute; left: 0; right: 0; top: 0; bottom: 0; background: rgba(0,0,0,0.7); color: white; z-index: 2; font-size: 18px; text-align: center; padding: 20px; }
      .hidden { display: none !important; }

      /* Email Modal Styling (Popup) */
      #email-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
      .modal-content { background-color: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 85%; max-width: 320px; }
      .modal-content h3 { margin-top: 0; margin-bottom: 25px; color: #222; font-size: 20px; }
      .modal-button { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; margin-bottom: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.2s; }
      .btn-send { background-color: #4CAF50; color: white; } 
      .btn-send:hover { background-color: #45a049; transform: translateY(-2px); }
      .btn-copy { background-color: #2196F3; color: white; } 
      .btn-copy:hover { background-color: #0b7dda; transform: translateY(-2px); }
      .btn-close { background-color: #757575; color: white; margin-top: 10px; font-weight: normal; }
      .btn-close:hover { background-color: #616161; }
    </style>
  </head>
  
  <body>
    <div id="scanning-overlay">Please point your camera at the business card...</div>

    <div id="email-modal">
      <div class="modal-content">
        <h3>Choose an action</h3>
        <button class="modal-button btn-send" onclick="sendEmail('pkp.stws@gmail.com')">
          <i class="material-icons" style="margin-right: 10px;">email</i> Send Email
        </button>
        <button class="modal-button btn-copy" onclick="copyEmail('pkp.stws@gmail.com')">
          <i class="material-icons" style="margin-right: 10px;">content_copy</i> Copy Email
        </button>
        <button class="modal-button btn-close" onclick="closeModal()">Close</button>
      </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #scanning-overlay; raycaster: far: 10000; objects: .clickable" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="portfolioIcon" src="porfolio.png">
        <img id="phoneIcon" src="smartphone.png">
        <img id="emailIcon" src="envelope.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image class="clickable" src="#portfolioIcon" position="-0.4 0.4 0.1" height="0.2" width="0.2"
                 onclick="window.open('https://drive.google.com/file/d/10mUyds_UDyGT82LLpQNxP7nT_0qHzfcn/view?usp=drive_link', '_blank')"></a-image>

        <a-image class="clickable" src="#phoneIcon" position="0.4 0.4 0.1" height="0.2" width="0.2"
                 onclick="window.location.href='tel:0624657402'"></a-image>

        <a-image class="clickable" src="#emailIcon" position="0.4 -0.4 0.1" height="0.2" width="0.2"
                 onclick="openModal()"></a-image>

      </a-entity>
    </a-scene>

    <script>
      const modal = document.getElementById('email-modal');

      function openModal() { modal.style.display = 'flex'; }
      function closeModal() { modal.style.display = 'none'; }

      function sendEmail(email) {
        window.location.href = `mailto:${email}`;
        closeModal();
      }

      function copyEmail(email) {
        navigator.clipboard.writeText(email).then(() => {
          alert('Email copied to clipboard!');
          closeModal();
        }).catch(err => {
          alert('Failed to copy email.');
        });
      }

      window.onclick = function(event) {
        if (event.target == modal) { closeModal(); }
      }
    </script>
  </body>
</html>
